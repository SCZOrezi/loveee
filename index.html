<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Random Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f1f1f1;
    font-family:sans-serif;
    padding:12px;
}

/* GRID */

.gallery{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    grid-auto-rows:180px;

    gap:12px;

    width:100%;
}

/* FOTO */

.item{

    overflow:hidden;

    border-radius:6px;

    background:#ccc;

    position:relative;
}

.item img{

    width:100%;
    height:100%;

    object-fit:cover;

    display:block;

    transition:transform 8s linear;

    will-change:transform;
}

.item:hover img{
    transform:scale(1.05);
}

/* UKURAN RANDOM */

.wide{
    grid-column:span 2;
}

.tall{
    grid-row:span 2;
}

.big{
    grid-column:span 2;
    grid-row:span 2;
}

/* RESPONSIVE ANDROID */

@media(max-width:700px){

    .gallery{

        grid-template-columns:repeat(2,1fr);

        grid-auto-rows:160px;
    }

}

</style>
</head>
<body>

<div class="gallery" id="gallery"></div>

<script>

/* FOTO KAMU */

const photos = [

    "foto1.jpg",
    "foto2.jpg",
    "foto3.jpg",
    "foto4.jpg",
    "foto5.jpg",
    "foto6.jpg",
    "foto7.jpg",
    "foto8.jpg",
    "foto9.jpg",
    "foto10.jpg",
    "foto11.jpg",
    "foto12.jpg",
    "foto13.jpg"

];

/* TIPE LAYOUT */

const layouts = [

    "wide",
    "tall",
    "big",
    "",
    "",
    "",
    "wide",
    "tall",
    ""

];

/* RANDOMIZE */

photos.sort(() => Math.random() - 0.5);

layouts.sort(() => Math.random() - 0.5);

const gallery = document.getElementById("gallery");

/* BUAT FOTO */

photos.forEach((photo,index)=>{

    const div = document.createElement("div");

    div.className = `item ${layouts[index % layouts.length]}`;

    div.innerHTML = `

        <img src="${photo}" loading="lazy">

    `;

    gallery.appendChild(div);

});


<script>

const images = document.querySelectorAll(".item img");

images.forEach(img => {

    moveImage(img);

    setInterval(() => {
        moveImage(img);
    }, 8000);

});

function moveImage(img){

    const x = Math.floor(Math.random() * 40) - 20;
    const y = Math.floor(Math.random() * 40) - 20;

    img.style.transform =
    `scale(1.15) translate(${x}px, ${y}px)`;

}

</script>

</body>
</html>
