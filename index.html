<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Random Photo Layout</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#f2f2f2;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:sans-serif;
      padding:40px 0;
    }

    .gallery{
      width:900px;
      display:grid;
      grid-template-columns: repeat(6, 1fr);
      grid-auto-rows:120px;
      gap:14px;
    }

    .item{
      overflow:hidden;
      border-radius:4px;
      background:#ccc;
      position:relative;
    }

    .item img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:0.4s;
    }

    .item:hover img{
      transform:scale(1.05);
    }

    /* SUSUNAN SESUAI GAMBAR */

    .a{
      grid-column:2 / 5;
      grid-row:1 / 3;
    }

    .b{
      grid-column:5 / 7;
      grid-row:1 / 4;
    }

    .c{
      grid-column:1 / 3;
      grid-row:3 / 5;
    }

    .d{
      grid-column:3 / 6;
      grid-row:3 / 6;
    }

    .e{
      grid-column:6 / 7;
      grid-row:3 / 5;
    }

    .f{
      grid-column:1 / 3;
      grid-row:5 / 6;
    }

    .g{
      grid-column:6 / 7;
      grid-row:5 / 6;
    }

    .h{
      grid-column:2 / 4;
      grid-row:6 / 8;
    }

    .i{
      grid-column:4 / 7;
      grid-row:6 / 8;
    }

    @media(max-width:768px){

      .gallery{
        width:95%;
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows:180px;
      }

      .item{
        grid-column:auto !important;
        grid-row:auto !important;
      }
    }
  </style>
</head>
<body>

  <div class="gallery">

    <div class="item a">
      <img src="https://picsum.photos/600/400?random=1">
    </div>

    <div class="item b">
      <img src="https://picsum.photos/500/700?random=2">
    </div>

    <div class="item c">
      <img src="https://picsum.photos/400/600?random=3">
    </div>

    <div class="item d">
      <img src="https://picsum.photos/700/700?random=4">
    </div>

    <div class="item e">
      <img src="https://picsum.photos/400/500?random=5">
    </div>

    <div class="item f">
      <img src="https://picsum.photos/600/300?random=6">
    </div>

    <div class="item g">
      <img src="https://picsum.photos/300/300?random=7">
    </div>

    <div class="item h">
      <img src="https://picsum.photos/500/700?random=8">
    </div>

    <div class="item i">
      <img src="https://picsum.photos/700/400?random=9">
    </div>

  </div>

</body>
</html>
