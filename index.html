<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Pinterest Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f2f2f2;
    padding:12px;
    overflow-x:hidden;
    font-family:sans-serif;
}

/* GALLERY */

.gallery{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    grid-auto-rows:180px;

    gap:12px;
}

/* ITEM */

.item{

    position:relative;

    overflow:hidden;

    border-radius:8px;

    background:#ccc;
}

/* FOTO */

.item img{

    position:absolute;

    width:120%;
    height:120%;

    top:-10%;
    left:-10%;

    object-fit:cover;

    transition:transform 8s ease-in-out;

    will-change:transform;
}

/* LAYOUT RANDOM */

.wide{
    grid-column:span 2;
}

.tall{
    grid-row:span 2;
}

.big{
    grid-column:span 2;
    grid-row:span 2;
}

/* RESPONSIVE ANDROID */

@media(max-width:700px){

    .gallery{

        grid-template-columns:repeat(2,1fr);

        grid-auto-rows:150px;
    }

}

</style>
</head>
<body>

<div class="gallery" id="gallery"></div>

<script>

/* FOTO */

const photos = [

    "foto1.jpg",
    "foto2.jpg",
    "foto3.jpg",
    "foto4.jpg",
    "foto5.jpg",
    "foto6.jpg",
    "foto7.jpg",
    "foto8.jpg",
    "foto9.jpg",
    "foto10.jpg",
    "foto11.jpg",
    "foto12.jpg",
    "foto13.jpg"

];

/* TIPE KOTAK */

const layouts = [

    "big",
    "tall",
    "wide",
    "",
    "",
    "",
    "wide",
    "tall",
    "",
    "",
    "",
    "",
    ""

];

/* ACAK FOTO */

photos.sort(() => Math.random() - 0.5);

/* ACAK LAYOUT */

layouts.sort(() => Math.random() - 0.5);

const gallery = document.getElementById("gallery");

/* BUAT GALERI */

photos.forEach((photo,index)=>{

    const item = document.createElement("div");

    item.className =
    `item ${layouts[index % layouts.length]}`;

    const img = document.createElement("img");

    img.src = photo;

    item.appendChild(img);

    gallery.appendChild(item);

});

/* GERAK FOTO AESTHETIC */

const images = document.querySelectorAll(".item img");

images.forEach(img => {

    animateImage(img);

    setInterval(() => {

        animateImage(img);

    },8000);

});

function animateImage(img){

    const x = random(-25,25);

    const y = random(-25,25);

    const scale = random(115,130) / 100;

    img.style.transform =
    `translate(${x}px, ${y}px) scale(${scale})`;

}

function random(min,max){

    return Math.floor(
        Math.random() * (max - min + 1)
    ) + min;

}

</script>

</body>
</html>
