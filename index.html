<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kolase Foto</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#f2f2f2;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;
}

/* CONTAINER FOTO */

.kolase{

    width:100%;

    max-width:900px;

    overflow:hidden;

    border-radius:12px;

    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* GAMBAR */

.kolase img{

    width:100%;

    display:block;

    object-fit:contain;
}

/* RESPONSIVE HP */

@media(max-width:700px){

    .kolase{

        max-width:100%;
        border-radius:8px;
    }

}

</style>
</head>
<body>

<div class="kolase">

    <img src="images/kolase.jpg" alt="Kolase Foto">

</div>

</body>
</html>
