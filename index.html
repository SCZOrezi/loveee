<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Artspace Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#efefef;
    font-family:sans-serif;

    display:flex;
    justify-content:center;

    padding:40px 0;
}

.gallery{

    width:850px;

    display:grid;

    grid-template-columns:
    110px 110px 110px 110px 110px 110px;

    grid-template-rows:
    90px
    90px
    110px
    110px
    110px
    120px
    120px;

    gap:14px;
}

.item{
    overflow:hidden;
    background:#ccc;
}

.item img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* SUSUNAN PERSIS SEPERTI GAMBAR */

/* atas kiri */
.a{
    grid-column:2 / 5;
    grid-row:1 / 3;
}

/* atas kanan tinggi */
.b{
    grid-column:5 / 7;
    grid-row:1 / 4;
}

/* kiri tengah tinggi */
.c{
    grid-column:1 / 3;
    grid-row:3 / 5;
}

/* tengah besar */
.d{
    grid-column:3 / 6;
    grid-row:3 / 6;
}

/* kanan kecil atas */
.e{
    grid-column:6 / 7;
    grid-row:3 / 5;
}

/* kiri kecil */
.f{
    grid-column:1 / 3;
    grid-row:5 / 6;
}

/* kanan kecil */
.g{
    grid-column:6 / 7;
    grid-row:5 / 6;
}

/* bawah kiri besar */
.h{
    grid-column:2 / 4;
    grid-row:6 / 8;
}

/* bawah kanan panjang */
.i{
    grid-column:4 / 7;
    grid-row:6 / 8;
}

@media(max-width:768px){

    .gallery{

        width:95%;

        grid-template-columns:1fr 1fr;
        grid-template-rows:auto;

    }

    .item{
        grid-column:auto !important;
        grid-row:auto !important;
        height:220px;
    }
}

</style>
</head>
<body>

<div class="gallery">

    <div class="item a">
        <img src="foto1.jpg">
    </div>

    <div class="item b">
        <img src="foto2.jpg">
    </div>

    <div class="item c">
        <img src="foto3.jpg">
    </div>

    <div class="item d">
        <img src="foto4.jpg">
    </div>

    <div class="item e">
        <img src="foto5.jpg">
    </div>

    <div class="item f">
        <img src="foto6.jpg">
    </div>

    <div class="item g">
        <img src="foto7.jpg">
    </div>

    <div class="item h">
        <img src="foto8.jpg">
    </div>

    <div class="item i">
        <img src="foto9.jpg">
    </div>

</div>

</body>
</html>
