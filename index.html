<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kolase Foto</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    /* BACKGROUND PINK GRADASI */

    background:
    linear-gradient(
        135deg,
        #ffb6d9,
        #ff8fc7,
        #ffc1e3
    );

    background-attachment:fixed;
}

/* CONTAINER FOTO */

.kolase{

    width:100%;

    max-width:900px;

    overflow:hidden;

    border-radius:16px;

    box-shadow:0 10px 35px rgba(0,0,0,0.18);
}

/* FOTO */

.kolase img{

    width:100%;

    display:block;

    object-fit:contain;
}

/* RESPONSIVE */

@media(max-width:700px){

    .kolase{

        max-width:100%;

        border-radius:10px;
    }

}

</style>
</head>
<body>

<div class="kolase">

    <img src="kolase.jpg" alt="Kolase Foto">

</div>

</body>
</html>
