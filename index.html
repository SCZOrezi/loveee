<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kolase Foto</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:25px;

    font-family:sans-serif;

    background:
    linear-gradient(
        135deg,
        #ffb6d9,
        #ff8fc7,
        #ffc1e3
    );

    background-attachment:fixed;
}

/* CONTAINER */

.container{

    width:100%;

    max-width:900px;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:25px;
}

/* GAMBAR ATAS */

.top-image{

    width:100%;

    max-width:500px;

    animation:float 4s ease-in-out infinite;
}

.top-image img{

    width:100%;

    display:block;
}

/* KOlASE */

.kolase{

    width:100%;

    overflow:hidden;

    border-radius:16px;

    box-shadow:0 10px 35px rgba(0,0,0,0.18);
}

.kolase img{

    width:100%;

    display:block;

    object-fit:contain;
}

/* ANIMASI */

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* RESPONSIVE HP */

@media(max-width:700px){

    .top-image{
        max-width:320px;
    }

    .kolase{
        border-radius:10px;
    }
}

</style>
</head>
<body>

<div class="container">

    <!-- GAMBAR ATAS -->
    <div class="top-image">

        <img src="love.jpg" alt="Love">

    </div>

    <!-- GAMBAR KOlASE -->
    <div class="kolase">

        <img src="kolase.jpg" alt="Kolase">

    </div>

</div>

</body>
</html>
